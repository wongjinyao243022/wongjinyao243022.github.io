<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3
    </title>
    <style>
        button {
            background-color: black;
            color: white;
            font-size: 15px;
            width: 160px;
            height: 40px;
            margin: 8px;
        }

        button.button2 {
            background-color: rgb(91, 165, 94);
            color: white;
            font-size: 16px;
            width: 120px;
            height: 40px;
            font-weight: bold;
            border-radius: 10px;
            border: none;
            margin: 8px;
        }

        button.button3 {
            background-color: rgb(249, 218, 72);
            color: black;
            font-size: 16px;
            width: 220px;
            height: 40px;
            font-family: Arial;
            font-weight: bold;
            border-radius: 20px;
            border: none;

        }

        button.button4 {
            background-color:
                rgba(115, 84, 173);
            color: white;
            font-size: 14px;
            width: 154px;
            height: 40px;
            font-family: Arial;
            font-weight: bold;
            border-radius: 4px;
            border: none;

        }

        button.button5 {
            background-color: rgb(255, 255, 255);
            color: grey;
            font-size: 14px;
            width: 130px;
            height: 40px;
            font-family: Arial;
            font-weight: bold;
            border-radius: 6px;
            border: 1px solid grey;

        }

        button.button6 {
            background-color: rgba(45, 101, 188);
            color: white;
            font-size: 14px;
            width: 240px;
            height: 40px;
            font-family: Arial;
            font-weight: bold;
            border-radius: 20px;
            border: none;

        }

        button.button7 {
            background-color: rgb(255, 255, 255);
            color: rgba(45, 101, 188);
            font-size: 16px;
            width: 100px;
            height: 40px;
            font-family: Arial;
            font-weight: bold;
            border-radius: 20px;
            border: 1px solid rgba(45, 101, 188);

        }
    </style>


</head>

<body>
    <button type="button">Request now</button>
    <button class="button2" type="button">Sign up</button>
    <button class="button3" type="button">Add to Cart</button>
    <br>
    <button class="button4" type="button">Get started</button>
    <button class="button5" type="button">Download</button>
    <button class="button6" type="button">Apply on company website</button>
    <button class="button7" type="button">Save</button>

</body>

</html>
