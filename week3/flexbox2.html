<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercise7</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');

    .consult {
        background-color: black;
        color: white;
        font-size: 15px;
        width: 220px;
        height: 55px;
        margin: 2px;
        border-radius: 8px;
        font-family: "Space Grotesk";
    }

    .request {
        color: black;
        font-size: 15px;
        width: 220px;
        height: 55px;
        margin: 2px;
        border-radius: 8px;
        border: 1px solid black;
        background-color: white;
        font-family: "Space Grotesk";
    }

    .bar {
        display: flex;
        width: 1440px;
        justify-content: center;
        gap: auto;
        padding: 30px;
        align-items: center;
    }

    .barlogo {
        padding-right: 430px;
        padding-left: 30px;
        align-items: left;
        width: auto;
        height: 40px;
    }

    .selection {
        display: flex;
        font-family: "Space Grotesk";
        justify-content: space-evenly;
        gap: 40px;
        align-items: center;
        width: 800px;
    }

    .header {
        display: flex;
        width: 1440px;
        height: 450px;
        justify-content: space-between;
        align-items: flex-start;
        padding: 60px;
        gap: auto;
    }

    .content {
        width: 600px;
        height: auto;
        gap: 35px;
        font-family: "Space Grotesk";
        align-items: top;
    }

    .illus {
        width: 600px;
        height: 500px;
        padding-right: 60px;
    }

    .logo {
        display: flex;
        justify-content: space-between;
        padding: 70px;
        width: 1370px;
        mix-blend-mode: luminosity;
    }

    .contentp {
        font-size: 20px;
    }

    .contenth {
        font-size: 60px;
    }
</style>

<body>

    <div class="bar">
        <img class="barlogo" src="images/barlogo.jpg" height="30px">
        <div class="selection">
            <p>About us</p>
            <p>Services</p>
            <p>Use Cases</p>
            <p>Pricing</p>
            <p>Blog</p>
            <button class="request" type="button">Request a quote</button>
        </div>
    </div>

    <div class="header">
        <div class="content">
            <h1 class="contenth">Navigating the digital landscape for success</h1>
            <p class="contentp">Our digital marketing agency helps businesses grow and succeed online through a range
                of services
                including
                SEO, PPC, social media marketing, and content creation.</p>
            <button class="consult" type="button">Book a consultation</button>
        </div>
        <img class="illus" src="images/Illustration.jpg" width="400">
    </div>

    <div class="logo">
        <img src="images/amazon.jpg" width="100">
        <img src="images/dribbble.jpg" width="100">
        <img src="images/hubspot.jpg" width="100">
        <img src="images/notion.jpg" width="100">
        <img src="images/netflix.jpg" width="100">
        <img src="images/zoom.jpg" width="100">
    </div>
</body>

</html>
